<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Álvaro Olivares V. | Tarjeta de Presentación</title>
<style>
  :root{
    --charcoal: #1a1a1a;
    --concrete: #8c8880;
    --accent: #c9a04a;
    --line: #e5e2dc;
    --bg: #fafaf8;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  body{
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: #ece9e3;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 40px 20px;
  }

  .card{
    width: 400px;
    background: var(--bg);
    display:flex;
    flex-direction: column;
    box-shadow: 0 20px 45px rgba(0,0,0,0.15);
  }

  .top{
    display:flex;
    align-items:center;
    gap: 20px;
    padding: 34px 32px 26px;
    border-bottom: 1px solid var(--line);
  }

  .avatar{
    width: 68px; height: 68px;
    border-radius: 4px;
    object-fit: cover;
    flex-shrink:0;
  }

  .name-block .name{
    font-size: 20px;
    font-weight: 700;
    color: var(--charcoal);
    letter-spacing: 0.3px;
  }

  .name-block .subtitle{
    font-size: 12px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-top: 4px;
    font-weight: 600;
  }

  .mid{
    padding: 24px 32px;
    display:flex;
    align-items:flex-start;
    gap: 14px;
  }

  .mid .bar{
    width: 3px;
    align-self: stretch;
    background: var(--accent);
    flex-shrink:0;
  }

  .mid p{
    font-size: 13px;
    color: var(--concrete);
    line-height: 1.7;
  }

  .mid p b{ color: var(--charcoal); }

  .contacts{
    padding: 4px 32px 30px;
    display:grid;
    grid-template-columns: 1fr;
    gap: 2px;
  }

  .contacts a{
    display:flex;
    align-items:center;
    justify-content:space-between;
    text-decoration:none;
    color: var(--charcoal);
    font-size: 13px;
    padding: 12px 0;
    border-bottom: 1px solid var(--line);
  }

  .contacts a:last-child{ border-bottom:none; }

  .contacts .label{
    color: var(--concrete);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .contacts .value{
    font-weight: 600;
  }

  .bottom{
    background: var(--charcoal);
    padding: 22px 32px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }

  .bottom .qr-wrap{
    display:flex;
    align-items:center;
    gap: 12px;
  }

  /* Cambios para el enlace del QR */
  .bottom .qr-link {
    display: block;
    line-height: 0;
    transition: transform 0.2s ease, opacity 0.2s ease;
  }

  .bottom .qr-link:hover {
    transform: scale(1.03);
    opacity: 0.9;
  }

  .bottom img.qr{
    width: 56px; height:56px;
    border-radius:4px;
    background:#fff;
    padding:3px;
    cursor: pointer;
  }

  .bottom .qr-text{
    font-size: 10px;
    color: #b8b4ab;
    line-height:1.5;
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }

  .bottom .mark{
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
    font-weight:700;
    writing-mode: vertical-rl;
  }
</style>
</head>
<body>

<div class="card">

  <div class="top">
    <img class="avatar" src="https://github.com/Olochile/CardAOV/blob/main/AO.jpg" alt="Álvaro Olivares V.">
    <div class="name-block">
      <div class="name">Álvaro Olivares V.</div>
      <div class="subtitle">Constructor Civil P.U.C.</div>
    </div>
  </div>

  <div class="mid">
    <div class="bar"></div>
    <p>
      <b>Gerente de Contratos de Construcción</b><br>
      Administrador de Obras
    </p>
  </div>

  <div class="contacts">
    <a href="tel:+56995974539">
      <span class="label">Teléfono</span>
      <span class="value">+56 9 9597 4539</span>
    </a>
    <a href="mailto:alvaroo@outlook.com">
      <span class="label">Correo</span>
      <span class="value">alvaroo@outlook.com</span>
    </a>
    <a href="https://www.linkedin.com/in/alvaroolivares/" target="_blank">
      <span class="label">LinkedIn</span>
      <span class="value">/in/alvaroolivares</span>
    </a>
    <a href="http://wa.me/56995974539" target="_blank">
      <span class="label">WhatsApp</span>
      <span class="value">Enviar mensaje</span>
    </a>
    <a href="https://t.me/Alvaro_olo" target="_blank">
      <span class="label">Telegram</span>
      <span class="value">@Alvaro_olo</span>
    </a>
  </div>

  <div class="bottom">
    <div class="qr-wrap">
      <!-- Se envuelve la imagen en un tag <a> para dirigir a la web deseada al hacer clic -->
      <a href="https://github.com/Olochile/CardAOV/raw/main/AOV.vcf" download="AOV.vcf" class="qr-link" title="Descargar contacto">
        <img class="qr" src="https://ajstempleton.wordpress.com/wp-content/uploads/2025/09/qrao2.jpg?w=150" alt="Código QR">
      </a>
      <div class="qr-text">Escanea o presiona<br>para guardar<br>contacto</div>
    </div>
    <div class="mark">AOV</div>
  </div>

</div>

</body>
</html>
